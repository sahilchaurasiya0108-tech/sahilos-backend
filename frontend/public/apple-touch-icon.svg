<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" shape-rendering="geometricPrecision">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1528"/>
    </linearGradient>

    <!-- Primary glow gradient for the S -->
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Glow filter for S -->
    <filter id="glowS" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for dots -->
    <filter id="glowDot" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner shadow for hexagon -->
    <filter id="hexShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>

    <!-- Clip for rounded rect -->
    <clipPath id="roundClip">
      <rect width="180" height="180" rx="38"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture overlay -->
  <rect width="180" height="180" rx="38" fill="none" stroke="#1e2540" stroke-width="0" opacity="0"/>

  <!-- Ambient glow blobs in background -->
  <ellipse cx="50" cy="45" rx="55" ry="40" fill="#6366f1" opacity="0.04"/>
  <ellipse cx="135" cy="140" rx="50" ry="38" fill="#4f46e5" opacity="0.05"/>

  <!-- Outer decorative ring - dashed arc feel -->
  <circle cx="90" cy="90" r="74" fill="none" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Second clean ring -->
  <circle cx="90" cy="90" r="68" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>

  <!-- Hexagon shape - the core -->
  <polygon 
    points="90,44 130,67 130,113 90,136 50,113 50,67" 
    fill="#111827" 
    stroke="#2a3450" 
    stroke-width="1.5"
    filter="url(#hexShadow)"
  />

  <!-- Hexagon inner highlight edge (top-left faces) -->
  <polyline 
    points="90,44 130,67 130,113"
    fill="none" 
    stroke="#6366f1" 
    stroke-width="1" 
    opacity="0.35"
  />

  <!-- The S letterform - shadow layer -->
  <text 
    x="90" y="111" 
    text-anchor="middle" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="74" 
    font-weight="700" 
    fill="#3730a3"
    opacity="0.6"
    dx="1" dy="2"
  >S</text>

  <!-- The S letterform - main -->
  <text 
    x="90" y="111" 
    text-anchor="middle" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="74" 
    font-weight="700" 
    fill="url(#sGrad)"
    filter="url(#glowS)"
  >S</text>

  <!-- Cardinal accent dots -->
  <!-- Top - indigo -->
  <circle cx="90" cy="16" r="5" fill="#6366f1" filter="url(#glowDot)"/>
  <circle cx="90" cy="16" r="3" fill="#a5b4fc"/>

  <!-- Right - emerald -->
  <circle cx="164" cy="90" r="4.5" fill="#10b981" filter="url(#glowDot)"/>
  <circle cx="164" cy="90" r="2.5" fill="#6ee7b7"/>

  <!-- Bottom - amber -->
  <circle cx="90" cy="164" r="4.5" fill="#f59e0b" filter="url(#glowDot)"/>
  <circle cx="90" cy="164" r="2.5" fill="#fcd34d"/>

  <!-- Left - blue -->
  <circle cx="16" cy="90" r="4.5" fill="#3b82f6" filter="url(#glowDot)"/>
  <circle cx="16" cy="90" r="2.5" fill="#93c5fd"/>

  <!-- Diagonal accent dots (corners of inner circle) -->
  <circle cx="148" cy="42" r="2.5" fill="#818cf8" opacity="0.7"/>
  <circle cx="148" cy="138" r="2.5" fill="#ec4899" opacity="0.7"/>
  <circle cx="32" cy="42" r="2.5" fill="#818cf8" opacity="0.7"/>
  <circle cx="32" cy="138" r="2.5" fill="#f59e0b" opacity="0.5"/>

  <!-- Subtle connecting lines from center dots to ring -->
  <line x1="90" y1="22" x2="90" y2="44" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="158" y1="90" x2="130" y2="90" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="158" x2="90" y2="136" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
  <line x1="22" y1="90" x2="50" y2="90" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
</svg>
