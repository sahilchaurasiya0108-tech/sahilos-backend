<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1528"/>
    </linearGradient>

    <linearGradient id="sG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="gS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="gD" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bgG)"/>

  <!-- Ambient glow -->
  <ellipse cx="18" cy="16" rx="20" ry="15" fill="#6366f1" opacity="0.05"/>
  <ellipse cx="48" cy="50" rx="18" ry="14" fill="#4f46e5" opacity="0.06"/>

  <!-- Outer ring dashed -->
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="url(#rG)" stroke-width="0.75" stroke-dasharray="3 2.5" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#6366f1" stroke-width="0.4" opacity="0.2"/>

  <!-- Hexagon -->
  <polygon 
    points="32,16 46.5,24.5 46.5,40.5 32,49 17.5,40.5 17.5,24.5" 
    fill="#111827" 
    stroke="#2a3450" 
    stroke-width="1"
  />

  <!-- Hexagon accent edge -->
  <polyline 
    points="32,16 46.5,24.5 46.5,40.5"
    fill="none" 
    stroke="#6366f1" 
    stroke-width="0.75" 
    opacity="0.4"
  />

  <!-- S shadow -->
  <text 
    x="32" y="39.5" 
    text-anchor="middle" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="26" 
    font-weight="700" 
    fill="#3730a3"
    opacity="0.5"
    dx="0.5" dy="1"
  >S</text>

  <!-- S main -->
  <text 
    x="32" y="39.5" 
    text-anchor="middle" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="26" 
    font-weight="700" 
    fill="url(#sG)"
    filter="url(#gS)"
  >S</text>

  <!-- Top dot -->
  <circle cx="32" cy="5.5" r="2" fill="#6366f1" filter="url(#gD)"/>
  <circle cx="32" cy="5.5" r="1.1" fill="#a5b4fc"/>

  <!-- Right dot -->
  <circle cx="58.5" cy="32" r="1.8" fill="#10b981" filter="url(#gD)"/>
  <circle cx="58.5" cy="32" r="1" fill="#6ee7b7"/>

  <!-- Bottom dot -->
  <circle cx="32" cy="58.5" r="1.8" fill="#f59e0b" filter="url(#gD)"/>
  <circle cx="32" cy="58.5" r="1" fill="#fcd34d"/>

  <!-- Left dot -->
  <circle cx="5.5" cy="32" r="1.8" fill="#3b82f6" filter="url(#gD)"/>
  <circle cx="5.5" cy="32" r="1" fill="#93c5fd"/>

  <!-- Corner micro dots -->
  <circle cx="53" cy="11" r="1.2" fill="#818cf8" opacity="0.65"/>
  <circle cx="53" cy="53" r="1.2" fill="#ec4899" opacity="0.65"/>
  <circle cx="11" cy="11" r="1.2" fill="#818cf8" opacity="0.65"/>
  <circle cx="11" cy="53" r="1.2" fill="#f59e0b" opacity="0.5"/>
</svg>
